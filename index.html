<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forester HYSA Arbitrage Dashboard</title>
    <style>
        :root {
            --primary: #0f172a;
            --secondary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            line-height: 1.5;
            padding: 2rem;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .header h1 {
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border-top: 4px solid var(--secondary);
        }
        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.25rem;
        }
        .card-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid #e2e8f0;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
        }
        .data-label {
            font-weight: 500;
        }
        .data-value {
            font-weight: 600;
        }
        .highlight-green {
            color: var(--success);
        }
        .highlight-red {
            color: var(--danger);
        }
        .net-result {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 2px dashed #e2e8f0;
            font-size: 1.1rem;
        }
        .hub-params {
            background: var(--primary);
            color: white;
            padding: 1rem 2rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        .hub-params div {
            margin: 0.5rem 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Forester Acquisition Strategy</h1>
        <p>Comparative Financial Analysis: HYSA Payment Hub Arbitrage</p>
    </div>

    <div class="hub-params">
        <div><strong>Starting HYSA Balance:</strong> $20,000</div>
        <div><strong>HYSA APY:</strong> 3.25%</div>
        <div><strong>Monthly Checking Contribution:</strong> $560</div>
        <div><strong>Down Payment:</strong> $0</div>
    </div>

    <div class="dashboard-grid" id="dashboard">
        </div>
</div>

<script>
    const hysaStartingBalance = 20000;
    const hysaApy = 0.0325;
    const monthlyContribution = 560;

    const scenarios = [
        {
            title: "Option 1: White Onyx (Timmons)",
            subtitle: "$39,000 OTD | 1.9% APR | 72 Months",
            otd: 39000,
            apr: 0.019,
            months: 72
        },
        {
            title: "Option 2: White Sport (Monrovia)",
            subtitle: "$38,500 OTD | 0.9% APR | 36 Months",
            otd: 38500,
            apr: 0.009,
            months: 36
        },
        {
            title: "Option 3: White Sport (Monrovia)",
            subtitle: "$38,500 OTD | 1.9% APR | 72 Months",
            otd: 38500,
            apr: 0.019,
            months: 72
        },
        {
            title: "Option 4: White Sport Hybrid (Timmons)",
            subtitle: "$40,000 OTD | 0.9% APR | 36 Months",
            otd: 40000,
            apr: 0.009,
            months: 36
        },
        {
            title: "Option 5: White Sport Hybrid (Timmons)",
            subtitle: "$40,000 OTD | 1.9% APR | 72 Months",
            otd: 40000,
            apr: 0.019,
            months: 72
        }
    ];

    function calculateScenario(scenario) {
        // Auto Loan Math
        const monthlyRate = scenario.apr / 12;
        const autoPayment = (scenario.otd * monthlyRate) / (1 - Math.pow(1 + monthlyRate, -scenario.months));
        const totalAutoInterest = (autoPayment * scenario.months) - scenario.otd;

        // HYSA Simulation over the life of the loan
        let currentBalance = hysaStartingBalance;
        let totalHysaInterest = 0;

        for (let i = 0; i < scenario.months; i++) {
            let monthlyInterest = currentBalance * (hysaApy / 12);
            totalHysaInterest += monthlyInterest;
            currentBalance += monthlyInterest;
            currentBalance -= autoPayment;
            currentBalance += monthlyContribution;
        }

        const netFinancialWin = totalHysaInterest - totalAutoInterest;
        const monthlyDrainGain = monthlyContribution - autoPayment;

        return {
            ...scenario,
            autoPayment: autoPayment,
            totalAutoInterest: totalAutoInterest,
            totalHysaInterest: totalHysaInterest,
            netFinancialWin: netFinancialWin,
            monthlyDrainGain: monthlyDrainGain
        };
    }

    function formatCurrency(num) {
        return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(num);
    }

    const dashboard = document.getElementById('dashboard');

    scenarios.forEach(scenario => {
        const results = calculateScenario(scenario);
        
        const winClass = results.netFinancialWin >= 0 ? 'highlight-green' : 'highlight-red';
        const drainGainText = results.monthlyDrainGain >= 0 
            ? `+${formatCurrency(results.monthlyDrainGain)} to HYSA/mo` 
            : `${formatCurrency(results.monthlyDrainGain)} from HYSA/mo`;
        const drainGainClass = results.monthlyDrainGain >= 0 ? 'highlight-green' : 'highlight-red';

        const cardHTML = `
            <div class="card">
                <div class="card-title">${results.title}</div>
                <div class="card-subtitle">${results.subtitle}</div>
                
                <div class="data-row">
                    <span class="data-label">Monthly Car Payment:</span>
                    <span class="data-value">${formatCurrency(results.autoPayment)}</span>
                </div>
                <div class="data-row">
                    <span class="data-label">Net HYSA Impact:</span>
                    <span class="data-value ${drainGainClass}">${drainGainText}</span>
                </div>
                <div class="data-row">
                    <span class="data-label">Total Loan Interest Paid:</span>
                    <span class="data-value highlight-red">-${formatCurrency(results.totalAutoInterest)}</span>
                </div>
                <div class="data-row">
                    <span class="data-label">Total HYSA Interest Earned:</span>
                    <span class="data-value highlight-green">+${formatCurrency(results.totalHysaInterest)}</span>
                </div>
                
                <div class="data-row net-result">
                    <span class="data-label">Net Arbitrage Win (Life of Loan):</span>
                    <span class="data-value ${winClass}">${formatCurrency(results.netFinancialWin)}</span>
                </div>
            </div>
        `;
        dashboard.innerHTML += cardHTML;
    });
</script>

</body>
</html>
